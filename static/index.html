<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Опт → розница: iPhone, Watch, iPad, AirPods, MacBook</title>
  <style>
    :root {
      font-family: system-ui, sans-serif;
      line-height: 1.45;
      --sidebar-w: 14rem;
      --col-w: minmax(17rem, 20rem);
      --filters-w: 12.5rem;
      --textarea-min-h: 70vh;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 1rem 1.25rem 1.5rem;
      color: #1a1a1a;
      min-height: 100vh;
    }
    h1 {
      font-size: 1.05rem;
      font-weight: 600;
      margin: 0 0 0.5rem;
      line-height: 1.3;
    }
    label { display: block; font-size: 0.8125rem; font-weight: 500; margin: 0 0 0.3rem; }
    .layout {
      display: grid;
      grid-template-columns: var(--sidebar-w) var(--col-w) var(--col-w) var(--filters-w);
      gap: 1rem 1.25rem;
      align-items: stretch;
      max-width: fit-content;
      margin: 0 auto;
      min-height: calc(100vh - 2.5rem);
    }
    .sidebar {
      display: flex;
      flex-direction: column;
      gap: 0;
      min-width: 0;
    }
    .sidebar .field { margin-bottom: 0.85rem; }
    input[type="number"], select {
      width: 100%;
      padding: 0.45rem 0.5rem;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 0.875rem;
    }
    .actions {
      display: flex;
      flex-direction: column;
      gap: 0.45rem;
      margin-top: 0.25rem;
    }
    button {
      padding: 0.5rem 0.75rem;
      font-size: 0.8125rem;
      border-radius: 6px;
      border: 1px solid #333;
      background: #222;
      color: #fff;
      cursor: pointer;
      width: 100%;
    }
    button:hover { background: #444; }
    button.secondary { background: #fff; color: #222; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .status { font-size: 0.75rem; color: #666; margin-top: 0.15rem; }
    .err {
      color: #b00020;
      font-size: 0.75rem;
      margin-top: 0.5rem;
      line-height: 1.35;
    }
    .col {
      display: flex;
      flex-direction: column;
      min-height: 0;
      min-width: 0;
    }
    .col-label { flex-shrink: 0; margin-bottom: 0.35rem; }
    textarea.col-textarea {
      flex: 1;
      width: 100%;
      min-height: var(--textarea-min-h);
      padding: 0.55rem 0.6rem;
      font-size: 0.75rem;
      font-family: ui-monospace, monospace;
      line-height: 1.35;
      border: 1px solid #ccc;
      border-radius: 6px;
      resize: vertical;
    }
    #out { background: #f8f9fa; }
    .filters-panel {
      display: flex;
      flex-direction: column;
      gap: 0.65rem;
      min-width: 0;
      padding: 0.65rem 0.75rem;
      border: 1px solid #ddd;
      border-radius: 8px;
      background: #fafafa;
      align-self: start;
      position: sticky;
      top: 1rem;
    }
    .filters-panel h2 {
      font-size: 0.8125rem;
      font-weight: 600;
      margin: 0;
      color: #333;
    }
    .filter-item {
      display: flex;
      align-items: flex-start;
      gap: 0.45rem;
      font-size: 0.75rem;
      line-height: 1.35;
      color: #333;
      cursor: pointer;
    }
    .filter-item input { margin-top: 0.2rem; flex-shrink: 0; }
    .filter-hint { font-size: 0.6875rem; color: #666; margin: 0; line-height: 1.35; }
    @media (max-width: 1200px) {
      .layout {
        grid-template-columns: var(--sidebar-w) var(--col-w) var(--col-w);
        grid-template-rows: auto auto;
      }
      .filters-panel {
        grid-column: 2 / -1;
        position: static;
      }
    }
    @media (max-width: 960px) {
      .layout {
        grid-template-columns: 1fr;
        max-width: 36rem;
      }
      :root { --textarea-min-h: 40vh; }
      .sidebar { order: 0; }
      .col-in { order: 1; }
      .col-out { order: 2; }
      .filters-panel { order: 3; grid-column: auto; }
    }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <h1>Опт → розница (смешанный прайс)</h1>

      <div class="field">
        <label for="usd">Курс USD → BYN</label>
        <input id="usd" type="number" step="0.01" min="0" value="3" />
      </div>
      <div class="field">
        <label for="markup">Наценка iPhone, USD</label>
        <input id="markup" type="number" step="0.01" min="0" value="100" />
      </div>
      <div class="field">
        <label for="markupWatch">Наценка Apple Watch, USD</label>
        <input id="markupWatch" type="number" step="0.01" min="0" value="95" />
      </div>
      <div class="field">
        <label for="markupIpad">Наценка iPad, USD</label>
        <input id="markupIpad" type="number" step="0.01" min="0" value="75" />
      </div>
      <div class="field">
        <label for="markupAirpods">Наценка AirPods, USD</label>
        <input id="markupAirpods" type="number" step="0.01" min="0" value="45" />
      </div>
      <div class="field">
        <label for="markupMacbook">Наценка MacBook, USD</label>
        <input id="markupMacbook" type="number" step="0.01" min="0" value="110" />
      </div>
      <div class="field">
        <label for="fmt">Формат входа</label>
        <select id="fmt">
          <option value="auto" selected>auto</option>
          <option value="text">text</option>
          <option value="csv">csv</option>
        </select>
      </div>

      <div class="actions">
        <button type="button" id="btn">Обработать</button>
        <button type="button" id="btnDl" class="secondary" disabled>Скачать CSV</button>
        <span id="status" class="status"></span>
      </div>
      <div id="err" class="err" hidden></div>
    </aside>

    <section class="col col-in">
      <label class="col-label" for="raw">Оптовый прайс</label>
      <textarea id="raw" class="col-textarea" placeholder="📱15 Pro 128 Black 🇦🇪 - 900&#10;⌚️S11 46 Jet Black SB S/M MEUW4 - 375&#10;SE 2 40 Midnight - 225"></textarea>
    </section>

    <section class="col col-out">
      <label class="col-label" for="out">Розничный прайс</label>
      <textarea id="out" class="col-textarea" readonly placeholder="Блоки по категориям из опта: iPhone, Watch, iPad, AirPods, MacBook — между блоками разделитель"></textarea>
    </section>

    <aside class="filters-panel" aria-label="Фильтры">
      <h2>Фильтры</h2>
      <label class="filter-item">
        <input type="checkbox" id="filterShowMissing" checked />
        <span>Показывать отсутствующие модели<br /><span class="filter-hint">(цена «по запросу»)</span></span>
      </label>
      <label class="filter-item">
        <input type="checkbox" id="includeCnUs" />
        <span>Доп. варианты SIM для 13–16 (CN/US)</span>
      </label>
      <p class="filter-hint" id="filterStats" hidden></p>
    </aside>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    let lastFullCsv = null;
    const MISSING_MARKER = "- **по запросу**";

    function isDashSeparatorLine(line) {
      return /^-+$/.test(line.trim());
    }

    const DASH_LINE = "------------------------";

    /**
     * После скрытия «по запросу» остаются пачки тире и пустых строк.
     * Пробег из пустых и/или тире с хотя бы одной строкой тире → одна линия тире между позициями.
     * Пробег только из пустых → одна пустая строка (разделитель объёмов памяти).
     */
    function collapseSeparatorRuns(lines) {
      const out = [];
      let i = 0;
      while (i < lines.length) {
        const t = lines[i].trim();
        if (t !== "" && !isDashSeparatorLine(lines[i])) {
          out.push(lines[i]);
          i++;
          continue;
        }
        let hasDash = false;
        while (i < lines.length) {
          const L = lines[i];
          const tt = L.trim();
          if (tt === "") {
            i++;
            continue;
          }
          if (isDashSeparatorLine(L)) {
            hasDash = true;
            i++;
            continue;
          }
          break;
        }
        const atStart = out.length === 0;
        const atEnd = i >= lines.length;
        if (atStart || atEnd) {
          continue;
        }
        if (hasDash) {
          out.push(DASH_LINE);
        } else {
          out.push("");
        }
      }
      return out;
    }

    function applyDisplayFilters(fullText) {
      if (!fullText || !fullText.trim()) return fullText;
      const lines = fullText.split(/\r?\n/);
      const showMissing = $("filterShowMissing").checked;
      if (showMissing) return lines.join("\n");
      const kept = lines.filter((line) => {
        const t = line.trim();
        if (t === "") return true;
        if (isDashSeparatorLine(t)) return true;
        return !t.includes(MISSING_MARKER);
      });
      return collapseSeparatorRuns(kept).join("\n");
    }

    function refreshFilteredOutput() {
      const stats = $("filterStats");
      if (!lastFullCsv) {
        stats.hidden = true;
        return;
      }
      const filtered = applyDisplayFilters(lastFullCsv);
      $("out").value = filtered;
      const total = lastFullCsv.split(/\r?\n/).filter((l) => l.trim()).length;
      const shown = filtered.split(/\r?\n/).filter((l) => l.trim()).length;
      if (!$("filterShowMissing").checked && total > 0 && shown < total) {
        stats.textContent = "Показано строк: " + shown + " из " + total + " позиций.";
        stats.hidden = false;
      } else {
        stats.textContent = "";
        stats.hidden = true;
      }
    }

    $("filterShowMissing").addEventListener("change", () => {
      refreshFilteredOutput();
    });

    $("btn").addEventListener("click", async () => {
      const err = $("err");
      err.hidden = true;
      err.textContent = "";
      $("status").textContent = "";
      $("btn").disabled = true;
      $("out").value = "";
      $("btnDl").disabled = true;
      lastFullCsv = null;
      $("filterStats").hidden = true;

      const raw = $("raw").value;
      const usd = parseFloat($("usd").value);
      const markup = parseFloat($("markup").value);
      const markupWatch = parseFloat($("markupWatch").value);
      const input_format = $("fmt").value;

      if (!raw.trim()) {
        err.textContent = "Вставьте текст оптового прайса.";
        err.hidden = false;
        $("btn").disabled = false;
        return;
      }
      const markupIpad = parseFloat($("markupIpad").value);
      const markupAirpods = parseFloat($("markupAirpods").value);
      const markupMacbook = parseFloat($("markupMacbook").value);

      if (!(usd > 0) || !(markup >= 0) || !(markupWatch >= 0) || !(markupIpad >= 0) || !(markupAirpods >= 0) || !(markupMacbook >= 0)) {
        err.textContent = "Укажите корректный курс и наценки по всем категориям (USD) ≥ 0.";
        err.hidden = false;
        $("btn").disabled = false;
        return;
      }

      try {
        const res = await fetch("/process/mixed", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            raw,
            input_format,
            usd_to_byn: usd,
            markup_usd_iphone: markup,
            markup_usd_watch: markupWatch,
            markup_usd_ipad: markupIpad,
            markup_usd_airpods: markupAirpods,
            markup_usd_macbook: markupMacbook,
            missing_price_text: "по запросу",
            delimiter_out: ";",
            include_cn_us_13_16: $("includeCnUs").checked,
          }),
        });
        const text = await res.text();
        if (!res.ok) {
          err.textContent = "Ошибка сервера: " + res.status + " — " + text.slice(0, 500);
          err.hidden = false;
          return;
        }
        lastFullCsv = text;
        refreshFilteredOutput();
        $("btnDl").disabled = false;
        const n = text.trim() ? text.trimEnd().split(/\r?\n/).length : 0;
        $("status").textContent = "Готово. Строк в прайсе: " + n;
      } catch (e) {
        err.textContent = "Не удалось связаться с сервером. Запущен ли uvicorn?";
        err.hidden = false;
      } finally {
        $("btn").disabled = false;
      }
    });

    $("btnDl").addEventListener("click", () => {
      if (!lastFullCsv) return;
      const payload = applyDisplayFilters(lastFullCsv);
      const blob = new Blob([payload], { type: "text/csv;charset=utf-8" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "retail_mixed.csv";
      a.click();
      URL.revokeObjectURL(a.href);
    });
  </script>
</body>
</html>
